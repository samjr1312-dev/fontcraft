<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FontCraft Pro - 100+ Decorative Fonts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✨ FontCraft Pro ✨</h1>
        <p class="subtitle">100+ decorative font styles | Custom colors</p>

        <!-- Text Input -->
        <textarea id="inputText" placeholder="Paste or type your text here..." rows="3"></textarea>

        <!-- Style Selection - 100+ Styles -->
        <div class="section-title">🎨 Choose Font Style (100+)</div>
        <div class="style-grid" id="styleGrid">
            <!-- Styles will be added by JavaScript -->
        </div>

        <!-- Color Controls -->
        <div class="section-title">🎨 Customize Colors</div>
        <div class="color-controls">
            <div class="color-item">
                <label>Text Color:</label>
                <input type="color" id="textColor" value="#333333">
            </div>
            <div class="color-item">
                <label>Background Color:</label>
                <input type="color" id="bgColor" value="#f8f9fa">
            </div>
            <div class="color-item">
                <label>Font Size:</label>
                <input type="range" id="fontSize" min="12" max="48" value="18">
                <span id="fontSizeValue">18px</span>
            </div>
        </div>

        <!-- Formatting Options -->
        <div class="formatting-options">
            <button id="toggleBold" class="format-btn">𝐁 Bold</button>
            <button id="toggleItalic" class="format-btn">𝐼 Italic</button>
            <button id="resetFormat" class="format-btn">⟳ Reset</button>
        </div>

        <!-- Theme Toggle -->
        <div class="theme-toggle">
            <button id="themeBtn" class="theme-btn">🌙 Dark Mode</button>
        </div>

        <!-- Preview Box -->
        <div class="section-title">📱 Preview</div>
        <div class="preview-box" id="previewBox">
            <div id="previewText">Your decorative text will appear here</div>
        </div>

        <!-- Copy Button -->
        <button id="copyBtn" class="copy-btn">📋 Copy to Clipboard</button>

        <!-- Success Message -->
        <div id="successMsg" class="success-msg hidden">✓ Copied to clipboard!</div>

        <!-- Ad Banner -->
        <div id="ad-banner" class="ad-banner">
            <!-- AdSense code goes here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
